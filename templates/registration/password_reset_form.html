{% extends 'base.html' %}
{% block content %}
<div class="container">
  <h3>Password reset</h3>
  <p>Enter your email to receive password reset link.</p>
  <form method="post">
    {% csrf_token %}
    {{ form.email }}
    <button class="btn btn-primary" type="submit">Send</button>
  </form>
</div>
{% endblock %}
